image: node:22

pages:
  stage: deploy
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends chromium ca-certificates fonts-liberation
    - export CHROMIUM_PATH="$(command -v chromium || command -v chromium-browser)"
    - npm ci
    - npm run verify:all
    - rm -rf public
    - cp -r dist public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
